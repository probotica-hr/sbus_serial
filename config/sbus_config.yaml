        minTurboSpeed: -3.0
        maxTurboSpeed: 3.0
        minTurboTurn: -1.0
        maxTurboTurn: 1.0
        minTurboLateral: -3.0
        maxTurboLateral: 3.0

        enableControlChannelIndex: 7
        enableControlChannelValue: 100.0

        modeChannelIndex: 5
        modeChannelThresholdLow: -50.0
        modeChannelThresholdHigh: 50.0

        enableUtilCommands: false
        batteryChannelIndex: 5
        batteryChannelValue: -100.0
