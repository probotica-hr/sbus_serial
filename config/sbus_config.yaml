/**/sbus_node:
    ros__parameters:
        port: "/dev/ttyUSB0"
        refresh_rate_hz: 20
        rxMinValue: 192
        rxMaxValue: 1792
        outMinValue: -100
        outMaxValue: 100
        silentOnFailsafe: true
        enableChannelNum: -1
        enableChannelProportionalMin: 1.0
        enableChannelProportionalMax: 1.0
        deadband: 100

/**/sbus_commands:
    ros__parameters:
        refresh_rate_hz: 20
        timeoutThreshold: 0.25 # in s

        forwardChannelIndx: 1
        turnChannelIndx: 3
        lateralChannelIndx: 0
        sbusMinValue: -100
        sbusMaxValue: 100
        turboChannelIndx: 4
        turboChannelValue: 0.0

        minSpeed: -1.0
